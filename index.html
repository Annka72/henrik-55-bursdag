<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gratulerer med dagen, min løve</title>
<style>
  :root{
    --bg:#170d10;
    --rosewine:#F2A6A0;
    --gold:#F3C969;
    --cream:#FBF3E6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(120% 80% at 50% 18%, #2a1820 0%, #170d10 60%, #100a0c 100%);
    color:var(--cream);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  /* ambient golden bokeh — echoes the fairy lights */
  .bokeh{position:fixed;inset:0;z-index:0;pointer-events:none;mix-blend-mode:screen}
  .bokeh span{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle, rgba(243,201,105,0.9), rgba(243,201,105,0) 70%);
    filter:blur(1px);
    animation:drift linear infinite, glow ease-in-out infinite;
  }
  @keyframes drift{
    from{transform:translateY(8vh)}
    to{transform:translateY(-12vh)}
  }
  @keyframes glow{0%,100%{opacity:0.18}50%{opacity:0.6}}

  .card{
    position:relative;z-index:1;
    max-width:min(94vw,640px);
    max-height:96svh;
    line-height:0;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(243,201,105,0.12);
    animation:enter 1.6s cubic-bezier(.2,.7,.2,1) both, breathe 11s ease-in-out 1.6s infinite;
  }
  .card img{
    display:block;
    width:100%;height:auto;
    max-height:96svh;
    object-fit:contain;
  }
  @keyframes enter{
    from{opacity:0;transform:scale(0.985)}
    to{opacity:1;transform:scale(1)}
  }
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.018)}}

  /* rosé bubbles rising from the glasses */
  .bubbles{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
  .bubble{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle at 32% 30%, rgba(255,255,255,0.9), var(--rosewine) 62%, rgba(242,166,160,0.15));
    box-shadow:0 0 7px rgba(242,166,160,0.55);
    animation:rise ease-in forwards;
  }
  @keyframes rise{
    0%{transform:translateY(0) translateX(0) scale(0.7);opacity:0}
    14%{opacity:0.95}
    100%{transform:translateY(var(--up,-55vh)) translateX(var(--drift,0)) scale(1);opacity:0}
  }

  /* the greeting text at the bottom IS the button — tap to toast */
  .toast-zone{
    position:absolute;
    left:23%;width:54%;
    top:88.6%;height:11%;
    z-index:3;
    appearance:none;border:0;padding:0;background:transparent;
    cursor:pointer;border-radius:16px;
    -webkit-tap-highlight-color:transparent;
  }
  .toast-zone::after{
    content:"";position:absolute;inset:-9% -5%;
    border-radius:22px;pointer-events:none;
    background:radial-gradient(60% 75% at 50% 55%, rgba(243,201,105,0.10), rgba(243,201,105,0) 72%);
    box-shadow:0 0 26px 5px rgba(243,201,105,0.12);
    transition:box-shadow .4s ease;
    /* a short read-pause, then a clearly visible, gentle breathing glow */
    animation:hint 3.4s ease-in-out 3.2s infinite;
  }
  @keyframes hint{
    0%,100%{box-shadow:0 0 24px 5px rgba(243,201,105,0.12)}
    50%{box-shadow:0 0 42px 14px rgba(243,201,105,0.44)}
  }
  .toast-zone:hover::after,
  .toast-zone:focus-visible::after{
    box-shadow:0 0 44px 14px rgba(243,201,105,0.50);animation:none;
  }
  .toast-zone:focus-visible{outline:2px solid var(--gold);outline-offset:4px}
  .toast-zone:active{transform:scale(0.985)}

  /* a friendly, visible nudge so it's clear the toast line is tappable */
  .tap-hint{
    position:absolute;left:50%;top:81.5%;
    transform:translateX(-50%);
    z-index:4;pointer-events:none;
    font:600 clamp(13px,3.4vw,16px)/1 system-ui,-apple-system,"Segoe UI",sans-serif;
    color:#3a1d12;white-space:nowrap;
    padding:9px 15px;border-radius:999px;
    background:linear-gradient(180deg,#FCE2A0,var(--gold));
    box-shadow:0 8px 22px rgba(0,0,0,0.38), 0 0 0 1px rgba(255,255,255,0.35) inset;
    opacity:0;
    animation:hintIn .7s ease 2.6s forwards, bob 2.6s ease-in-out 3.3s infinite;
  }
  .tap-hint::after{
    content:"";position:absolute;left:50%;top:100%;
    transform:translateX(-50%);
    border:7px solid transparent;border-top-color:var(--gold);
  }
  .tap-hint.gone{opacity:0 !important;animation:none;transition:opacity .5s ease}
  @keyframes hintIn{
    from{opacity:0;transform:translateX(-50%) translateY(6px)}
    to{opacity:1;transform:translateX(-50%) translateY(0)}
  }
  @keyframes bob{0%,100%{translate:0 0}50%{translate:0 -6px}}

  /* hearts rising on a toast */
  .heart{
    position:absolute;z-index:2;pointer-events:none;
    text-shadow:0 0 8px rgba(242,166,160,0.6);
    animation:floatUp ease-in forwards;
  }
  @keyframes floatUp{
    0%{transform:translateY(0) scale(0.6);opacity:0}
    16%{opacity:1}
    100%{transform:translateY(var(--up,-46vh)) translateX(var(--drift,0)) scale(1.1);opacity:0}
  }

  /* a warm golden glimmer washes over the card when you toast */
  .flash{
    position:absolute;inset:0;z-index:2;pointer-events:none;opacity:0;
    background:radial-gradient(60% 50% at 50% 60%, rgba(243,201,105,0.55), rgba(243,201,105,0) 70%);
    mix-blend-mode:screen;
  }
  .flash.go{animation:bloom 1.1s ease-out}
  @keyframes bloom{0%{opacity:0}22%{opacity:1}100%{opacity:0}}

  /* hidden hotspots over the book and the little card */
  .hotspot{
    position:absolute;z-index:3;
    appearance:none;border:0;background:transparent;padding:0;
    cursor:pointer;border-radius:10px;
    -webkit-tap-highlight-color:transparent;
  }
  .hotspot::after{
    content:"";position:absolute;inset:-6%;border-radius:14px;pointer-events:none;
    box-shadow:0 0 0 0 rgba(243,201,105,0);
  }
  /* neutral until the toast — then the other tappable spots gently come to life */
  .card.toasted .hotspot::after{animation:beacon 4.2s ease-in-out infinite}
  .hotspot:hover::after,.hotspot:focus-visible::after{
    box-shadow:0 0 32px 9px rgba(243,201,105,0.46);animation:none;
  }
  .hotspot:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
  .hotspot:active{transform:scale(0.97)}
  @keyframes beacon{
    0%,100%{box-shadow:0 0 0 0 rgba(243,201,105,0)}
    50%{box-shadow:0 0 26px 7px rgba(243,201,105,0.34)}
  }
  #hsBook{left:38%;top:69%;width:27%;height:13%}
  #hsCard{left:6%;top:59%;width:17%;height:13%}

  /* the reveal panel that lifts the words off the page */
  .reveal{
    position:absolute;inset:0;z-index:5;
    display:flex;align-items:center;justify-content:center;
    padding:6%;line-height:1.5;cursor:pointer;
    background:rgba(15,9,11,0.55);
    backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
    opacity:0;pointer-events:none;transition:opacity .5s ease;
  }
  .reveal.open{opacity:1;pointer-events:auto}
  .reveal-panel{
    max-width:80%;
    background:linear-gradient(180deg, rgba(251,243,230,0.97), rgba(247,232,205,0.97));
    color:#3a1d12;border-radius:16px;
    padding:26px 30px;text-align:center;
    box-shadow:0 24px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(243,201,105,0.5);
    transform:scale(0.92) translateY(8px);transition:transform .5s cubic-bezier(.2,.7,.2,1);
    font-family:Georgia,"Times New Roman",serif;
  }
  .reveal.open .reveal-panel{transform:scale(1) translateY(0)}
  .reveal-title{font-size:clamp(15px,3.4vw,19px);letter-spacing:.02em;opacity:.7;margin-bottom:12px;font-style:italic}
  .reveal-body{font-size:clamp(20px,5.6vw,30px);font-weight:600}
  .reveal-body span{display:block;margin:.18em 0}
  .reveal-tail{margin-top:.6em;font-size:clamp(17px,4.4vw,23px);font-style:italic;font-weight:600;color:#5a2a16}
  .reveal-close{margin-top:16px;font-size:13px;opacity:.55;font-family:system-ui,sans-serif}

  /* drifting steam from the coffee */
  .steam{position:absolute;left:7%;top:60%;width:18%;height:22%;z-index:2;pointer-events:none}
  .steam i{
    position:absolute;bottom:0;width:14px;height:64%;
    background:linear-gradient(to top, rgba(255,255,255,0), rgba(255,255,255,0.72) 42%, rgba(255,255,255,0));
    border-radius:50%;filter:blur(5px);opacity:0;
    transform:translateX(-50%);
    animation:steam ease-in-out infinite;
  }
  .steam i:nth-child(1){left:40%;animation-duration:5.5s;animation-delay:0s}
  .steam i:nth-child(2){left:52%;animation-duration:6.5s;animation-delay:1.2s}
  .steam i:nth-child(3){left:46%;animation-duration:6s;animation-delay:2.6s}
  .steam i:nth-child(4){left:58%;animation-duration:7s;animation-delay:3.6s}
  @keyframes steam{
    0%{opacity:0;transform:translate(-50%,0) scaleX(1) scaleY(.6)}
    15%{opacity:.85}
    55%{opacity:.5}
    100%{opacity:0;transform:translate(-50%,-135%) translateX(14px) scaleX(1.9) scaleY(1.3)}
  }

  /* the book and the little card lift gently off the page once they're awake */
  .lift-el{
    position:absolute;z-index:2;pointer-events:none;display:block;height:auto;
    transform-origin:50% 92%;will-change:transform;
  }
  #liftBook{left:36%;top:70%;width:30%}
  #liftCard{left:4%;top:57%;width:21%}
  .card.toasted #liftBook{animation:lift 5.5s ease-in-out .6s infinite}
  .card.toasted #liftCard{animation:lift 5.5s ease-in-out 1.4s infinite}
  @keyframes lift{
    0%,20%,100%{transform:translateY(0) rotate(0deg);filter:drop-shadow(0 2px 3px rgba(0,0,0,0))}
    7%{transform:translateY(-8px) rotate(-0.7deg);filter:drop-shadow(0 12px 12px rgba(0,0,0,0.38))}
    13%{transform:translateY(-3px) rotate(0.3deg);filter:drop-shadow(0 7px 9px rgba(0,0,0,0.24))}
  }

  @media (prefers-reduced-motion:reduce){
    .card,.bokeh span,.toast-zone::after{animation:none}
    .card{opacity:1}
    .toast-zone::after{box-shadow:0 0 30px 7px rgba(243,201,105,0.24)}
    .tap-hint{animation:none;opacity:1}
    .hotspot::after{animation:none}
    .lift-el{animation:none}
    .steam{display:none}
  }
</style>
</head>

    <button class="toast-zone" id="toastZone" aria-label="Skål for deg i dag, kjære løven min — trykk for å skåle i rosé"></button>
    <div class="tap-hint" id="tapHint" aria-hidden="true">🥂 Trykk for å skåle</div>
    <div class="steam" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
    <button class="hotspot" id="hsBook" aria-label="Åpne ordene i boka"></button>
    <button class="hotspot" id="hsCard" aria-label="Åpne kortet: De små øyeblikkene er de store minnene"></button>
    <div class="reveal" id="reveal" aria-hidden="true">
      <div class="reveal-panel" id="revealPanel" role="dialog" aria-modal="true"></div>
    </div>
  </div>

<script>
  // ambient bokeh lights
  (function(){
    const wrap = document.getElementById('bokeh');
    const N = 14;
    for(let i=0;i<N;i++){
      const s = document.createElement('span');
      const size = 6 + Math.random()*26;
      s.style.width = size+'px';
      s.style.height = size+'px';
      s.style.left = (Math.random()*100)+'%';
      s.style.top = (Math.random()*100)+'%';
      s.style.animationDuration = (8+Math.random()*10)+'s, '+(3+Math.random()*4)+'s';
      s.style.animationDelay = (-Math.random()*10)+'s, '+(-Math.random()*4)+'s';
      wrap.appendChild(s);
    }
  })();

  // rosé toast: bubbles + a soft clink
  const btn = document.getElementById('toastZone');
  const layer = document.getElementById('bubbles');
  let ctx;

  function ping(t, freq, dur, peak, type){
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(peak, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + 0.05);
  }
  function clink(){
    ctx = ctx || new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    const t = ctx.currentTime;
    ping(t,        1180, 0.5, 0.10, 'triangle');
    ping(t + 0.02, 1568, 0.6, 0.09, 'triangle');
    [0.18,0.30,0.44,0.60,0.78].forEach((d,i)=> ping(t+d, 2000+i*420, 0.25, 0.05, 'sine'));
  }

  function spawnBubbles(n){
    const box = layer.getBoundingClientRect();
    for(let i=0;i<n;i++){
      const b = document.createElement('span');
      b.className = 'bubble';
      const size = 5 + Math.random()*18;
      b.style.width = size+'px';
      b.style.height = size+'px';
      // origin: the two rosé glasses sit around 29% and 63% width, ~66% down
      b.style.left = (Math.random()<0.5 ? 25+Math.random()*10 : 59+Math.random()*10)+'%';
      b.style.top  = (63 + Math.random()*6)+'%';
      b.style.setProperty('--up', -(40 + Math.random()*30)+'vh');
      b.style.setProperty('--drift', (Math.random()*90-45)+'px');
      const dur = 4 + Math.random()*3;
      b.style.animationDuration = dur+'s';
      b.style.animationDelay = (Math.random()*0.5)+'s';
      layer.appendChild(b);
      setTimeout(()=>b.remove(), (dur+0.8)*1000);
    }
  }

  // hearts rising on a toast
  function spawnHearts(n){
    const glyphs = ['♥','❤','♡'];
    for(let i=0;i<n;i++){
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = glyphs[i % glyphs.length];
      h.style.fontSize = (16 + Math.random()*22) + 'px';
      h.style.color = Math.random()<0.5 ? 'var(--rosewine)' : 'var(--gold)';
      h.style.left = (20 + Math.random()*60) + '%';
      h.style.top  = (60 + Math.random()*10) + '%';
      h.style.setProperty('--up', -(34 + Math.random()*26) + 'vh');
      h.style.setProperty('--drift', (Math.random()*80-40) + 'px');
      const dur = 3.2 + Math.random()*2.2;
      h.style.animationDuration = dur + 's';
      h.style.animationDelay = (Math.random()*0.4) + 's';
      layer.appendChild(h);
      setTimeout(()=>h.remove(), (dur+0.6)*1000);
    }
  }

  const flash = document.getElementById('flash');
  const hint  = document.getElementById('tapHint');
  let toasted = false;

  function toast(){
    clink();
    spawnBubbles(52);
    spawnHearts(14);
    flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
    if (navigator.vibrate) navigator.vibrate([8, 40, 14]);
    if (!toasted){ toasted = true; hint.classList.add('gone'); document.querySelector('.card').classList.add('toasted'); }
  }
  btn.addEventListener('click', toast);

  // tap the book or the little card to lift their words up; tap again to close
  const reveal = document.getElementById('reveal');
  const revealPanel = document.getElementById('revealPanel');
  const notes = {
    hsBook: { body:['Ideer','Drømmer','Planer','Latter','Kreativitet'], tail:'Vi skaper historien vår ♡' },
    hsCard: { body:['De små øyeblikkene','er de store minnene ♡'] }
  };
  function openNote(key){
    const n = notes[key]; if(!n) return;
    revealPanel.innerHTML =
      '<div class="reveal-body">'+ n.body.map(l=>'<span>'+l+'</span>').join('') +'</div>' +
      (n.tail ? '<div class="reveal-tail">'+n.tail+'</div>' : '') +
      '<div class="reveal-close">Trykk for å lukke</div>';
    reveal.classList.add('open');
  }
  function closeNote(){ reveal.classList.remove('open'); }
  document.getElementById('hsBook').addEventListener('click', ()=>openNote('hsBook'));
  document.getElementById('hsCard').addEventListener('click', ()=>openNote('hsCard'));
  reveal.addEventListener('click', closeNote);
  document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeNote(); });

  // gentle parallax — the card drifts a touch with the pointer
  const card = document.querySelector('.card');
  if (!window.matchMedia('(prefers-reduced-motion:reduce)').matches){
    window.addEventListener('pointermove', (e)=>{
      const dx = e.clientX / window.innerWidth  - 0.5;
      const dy = e.clientY / window.innerHeight - 0.5;
      card.style.translate = (dx*-10).toFixed(1)+'px '+(dy*-8).toFixed(1)+'px';
    }, {passive:true});
  }
</script>
</body>
</html>
